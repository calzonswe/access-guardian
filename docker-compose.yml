services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: rbac_access
      POSTGRES_USER: rbac_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme_in_production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rbac_user -d rbac_access"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # Backend API (Express.js)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: rbac_access
      DB_USER: rbac_user
      DB_PASSWORD: ${DB_PASSWORD:-changeme_in_production}
      JWT_SECRET: ${JWT_SECRET:-changeme_jwt_secret}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  # Frontend (React app served by nginx)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    depends_on:
      - backend
    networks:
      - internal

volumes:
  postgres_data:

networks:
  internal:
    driver: bridge
